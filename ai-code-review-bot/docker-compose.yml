version: "3.9"

services:
  bot:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app   # Hot reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Optional: expose local server for webhook testing
  # Run: docker compose --profile tunnel up
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["tunnel"]
    command: http bot:8000
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - bot
